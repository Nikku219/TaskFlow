<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow - To-Do List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>TaskFlow</h1>

        <p>Manage your daily tasks easily</p>

        <div class="task-input">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter your task"
            >

            <button id="addTaskBtn">
                Add Task
            </button>
        </div>

        <div class="task-stats">

            <div>
                <h3 id="totalTasks">0</h3>
                <p>Total</p>
            </div>

            <div>
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>

            <div>
                <h3 id="pendingTasks">0</h3>
                <p>Pending</p>
            </div>

        </div>

        <div class="filters">

            <button onclick="showAll()">
                All
            </button>

            <button onclick="showPending()">
                Pending
            </button>

            <button onclick="showCompleted()">
                Completed
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
